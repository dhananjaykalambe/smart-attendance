<!DOCTYPE html>
<html lang="en">
<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <title>Login</title>
</head>
<body class="d-flex align-items-center bg-primary" style="height: 100vh;">
    <div class="container bg-white p-5 rounded shadow-lg" style="max-width: 450px;">
        <h2 class="text-center fw-bold mb-4">Smart Login</h2>
        <form action="/login" method="POST">
            <div class="mb-3">
                <label class="form-label small fw-bold text-muted">ROLL NO / USERNAME</label>
                <input type="text" name="uid" class="form-control form-control-lg bg-light" required>
            </div>
            <div class="mb-4">
                <label class="form-label small fw-bold text-muted">PASSWORD</label>
                <input type="password" name="password" class="form-control form-control-lg bg-light" required>
            </div>
            <button class="btn btn-primary btn-lg w-100 shadow-sm">Login to Portal</button>
        </form>
    </div>
</body>
</html>
