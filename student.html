<!DOCTYPE html>
<html lang="en">
<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Student Portal</title>
</head>
<body class="p-4 text-center">
    <div class="container" style="max-width: 500px;">
        <div class="card p-4 shadow">
            <h3>Welcome, {{ session['name'] }}</h3>
            <p class="text-muted">Roll No: {{ session['roll_no'] }}</p>
            <hr>
            <button id="markBtn" onclick="markAttendance()" class="btn btn-primary btn-lg w-100">Mark My Attendance</button>
            <div id="result" class="mt-3 fw-bold"></div>
            <a href="/logout" class="mt-4 d-block text-danger text-decoration-none">Logout</a>
        </div>
    </div>

    <script>
        function markAttendance() {
            const btn = document.getElementById('markBtn');
            btn.disabled = true;
            btn.innerText = "Checking Location...";

            navigator.geolocation.getCurrentPosition(pos => {
                fetch('/mark_attendance', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({lat: pos.coords.latitude, lon: pos.coords.longitude})
                })
                .then(res => res.json())
                .then(data => {
                    const resDiv = document.getElementById('result');
                    resDiv.innerText = data.message;
                    resDiv.className = data.status === 'success' ? 'mt-3 text-success' : 'mt-3 text-danger';
                    btn.disabled = false;
                    btn.innerText = "Mark My Attendance";
                });
            }, err => {
                alert("Please enable GPS/Location access!");
                btn.disabled = false;
            });
        }
    </script>
</body>
</html>
