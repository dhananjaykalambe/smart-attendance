<!DOCTYPE html>

<html lang="en">

<head>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

    <title>Teacher Admin</title>

</head>

<body class="bg-light">

    <nav class="navbar navbar-dark bg-primary shadow-sm mb-4">

        <div class="container">

            <span class="navbar-brand mb-0 h1">Smart Attendance Portal</span>

            <a href="/logout" class="btn btn-light btn-sm">Logout</a>

        </div>

    </nav>

    <div class="container">

        <div class="row g-4">

            <div class="col-md-4">

                <div class="card border-0 shadow-sm mb-4">

                    <div class="card-body">

                        <h5 class="fw-bold">Session Control</h5>

                        <button onclick="startSession()" class="btn btn-success w-100 py-2 mt-2">Start 100m Session</button>

                        <div id="status" class="mt-3 text-center fw-bold text-primary"></div>

                    </div>

                </div>

                <div class="card border-0 shadow-sm">

                    <div class="card-body">

                        <h5 class="fw-bold">Bulk Student Upload</h5>

                        <form action="/upload_csv" method="POST" enctype="multipart/form-data">

                            <input type="file" name="file" class="form-control mb-3" accept=".csv" required>

                            <button class="btn btn-outline-primary w-100">Upload CSV List</button>

                        </form>

                        <p class="small text-muted mt-2 text-center">CSV: roll_no, name, branch, semester</p>

                    </div>

                </div>

            </div>

            <div class="col-md-8">

                <div class="card border-0 shadow-sm">

                    <div class="card-body">

                        <h5 class="fw-bold mb-4">Attendance Report</h5>

                        <table class="table table-hover">

                            <thead class="table-light">

                                <tr><th>Roll No</th><th>Name</th><th>Time</th></tr>

                            </thead>

                            <tbody>

                                {% for log in history %}

                                <tr>

                                    <td><strong>{{ log.roll_no }}</strong></td>

                                    <td>{{ log.name }}</td>

                                    <td class="text-muted small">{{ log.date.strftime('%I:%M %p') }}</td>

                                </tr>

                                {% endfor %}

                            </tbody>

                        </table>

                    </div>

                </div>

            </div>

        </div>

    </div>

    <script>

        function startSession() {

            document.getElementById('status').innerText = "Locating...";

            navigator.geolocation.getCurrentPosition(pos => {

                fetch('/start_session', {

                    method: 'POST',

                    headers: {'Content-Type': 'application/json'},

                    body: JSON.stringify({lat: pos.coords.latitude, lon: pos.coords.longitude})

                }).then(() => { document.getElementById('status').innerText = "✅ Session Live"; });

            }, err => alert("Enable GPS to start session"));

        }

    </script>

</body>

</html>
